name: Deploy Software Manifesto

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Test ────────────────────────────────────────────
  test:
    name: SEO & HTML Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run SEO unit tests
        run: node -e "
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf-8');
          const checks = [
            [/<html[^>]+lang=\"en\"/.test(html), 'lang=en'],
            [/<title>[\s\S]*?Software Manifesto[\s\S]*?<\/title>/i.test(html), 'title keyword'],
            [/<meta\s+name=\"description\"/.test(html), 'meta description'],
            [/<link\s+rel=\"canonical\"/.test(html), 'canonical'],
            [/property=\"og:title\"/.test(html), 'og:title'],
            [/property=\"og:image\"/.test(html), 'og:image'],
            [/name=\"twitter:card\"/.test(html), 'twitter:card'],
            [/application\/ld\+json/.test(html), 'json-ld'],
            [/<h1[\s\S]*?>[\s\S]*?Software Manifesto/i.test(html), 'h1 keyword'],
            [fs.existsSync('robots.txt'), 'robots.txt'],
            [fs.existsSync('sitemap.xml'), 'sitemap.xml'],
          ];
          let fail = false;
          checks.forEach(([ok, name]) => { console.log((ok ? 'PASS' : 'FAIL') + ': ' + name); if(!ok) fail=true; });
          process.exit(fail ? 1 : 0);
        "

      - name: Validate JSON-LD
        run: node -e "
          const html = require('fs').readFileSync('index.html', 'utf-8');
          const m = html.match(/<script type=\"application\/ld\+json\">([\s\S]+?)<\/script>/);
          if (!m) { console.error('No JSON-LD found'); process.exit(1); }
          try { JSON.parse(m[1]); console.log('JSON-LD: valid'); } catch(e) { console.error('JSON-LD invalid:', e.message); process.exit(1); }
        "

      - name: Validate sitemap XML
        run: python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('sitemap.xml')
          root = tree.getroot()
          print('sitemap.xml: valid XML')
        "

  # ─── Lighthouse CI ──────────────────────────────────────────
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install serve & lighthouse
        run: npm install -g serve @lhci/cli

      - name: Start local server
        run: serve -p 3000 . &
        
      - name: Wait for server
        run: sleep 3

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:3000 \
            --collect.numberOfRuns=1 \
            --assert.assertions.performance=warn:0.9 \
            --assert.assertions.seo=warn:0.95 \
            --assert.assertions.accessibility=warn:0.9 \
            --upload.target=temporary-public-storage || true

  # ─── Deploy to Netlify ──────────────────────────────────────
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://softwaremanifesto.dev
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '.'
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          netlify-config-path: ./netlify.toml
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Notify on success
        if: success()
        run: echo "Deployment successful to https://softwaremanifesto.dev"
